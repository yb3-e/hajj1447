name: 🔄 التحديث التلقائي الشامل

on:
  schedule:
    - cron: '0 */2 * * *' # يشتغل كل ساعتين
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 سحب ملفات المشروع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تثبيت المكتبات اللازمة
        run: |
          pip install requests pandas openpyxl selenium webdriver-manager run: pip install requests pandas openpyxl selenium undetected-chromedriver

      - name: 🚀 تشغيل كود السحب والدمج
        env:
          HAJJ_USER: ${{ secrets.HAJJ_USER }}
          HAJJ_PASS: ${{ secrets.HAJJ_PASS }}
        run: python fetch_data.py

      - name: 📤 رفع التقرير الشامل للموقع
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "تحديث تلقائي شامل: إحصائيات + غياب 🕒" || echo "لا يوجد تغييرات للرفع"
          git push
