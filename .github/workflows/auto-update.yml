name: Auto Update Dashboard

on:
  schedule:
    - cron: '0 */2 * * *' # تشغيل الكود كل ساعتين
  workflow_dispatch: # إضافة زر في GitHub لتشغيل الكود يدوياً متى ما بغيت

permissions:
  contents: write # إعطاء الصلاحية للروبوت عشان يقدر يسوي Push للملفات

jobs:
  update-data:
    runs-on: ubuntu-latest # نظام التشغيل حق السيرفر

    steps:
      - name: 📥 جلب ملفات المشروع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تثبيت المكتبات المطلوبة
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: 🚀 تشغيل كود سحب البيانات (كود المهندس عبدالعزيز)
        run: python fetch_data.py
- name: 🚀 رفع التحديثات
        run: |
          git config --global user.name "GitHub-Actions-Bot"
          git config --global user.email "actions@github.com"
          git add index.html || echo "File not found, skipping add"
          git commit -m "تحديث تلقائي للبيانات 🔄" || echo "No changes to commit"
          git push origin main
