name: 🔄 تحديث بيانات الحج تلقائياً

on:
  schedule:
    - cron: '0 */2 * * *' # يشتغل كل ساعتين
  workflow_dispatch: # يسمح لك بتشغيله يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تثبيت المكتبات اللازمة
        run: |
          pip install requests pandas openpyxl

      - name: 🚀 تشغيل كود سحب البيانات
        env:
          HAJJ_TOKEN: ${{ secrets.HAJJ_TOKEN }}
        run: python fetch_data.py

      - name: 📤 رفع التحديثات إلى GitHub
        run: |
          git config --global user.name "GitHub-Actions-Bot"
          git config --global user.email "actions@github.com"
          git add index.html || echo "الملف غير موجود حالياً"
          git commit -m "تحديث تلقائي للبيانات 🔄" || echo "لا توجد تغييرات للرفع"
          git push origin main
